# aim.iceberg101.com 등 프로덕션에서 주간보고서 생성(POST /api/reports/.../generate)이
# 기본 proxy_read_timeout(보통 60초)을 넘기면 504가 나고, HTML 오류 페이지가 반환되어
# 프론트에서 "Unexpected token '<'" / JSON 파싱 오류가 납니다.
#
# server { ... } 안의 기존 location / 또는 location /api 블록에 아래를 반영하거나,
# 더 긴 타임아웃이 필요한 경로만 별도 location 으로 두세요.

# 예: API 전체에 10분
location /api/ {
    proxy_pass http://127.0.0.1:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 600s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    send_timeout 600s;
}

# 또는 생성 API만 좁게 지정할 때 (위와 중복되지 않게 하나만 사용)
