# aim.iceberg101.com — OpenResty / Nginx 공통
# 증상: tlsv1 unrecognized name → server_name·인증서가 이 호스트와 맞지 않을 때 발생
#
# 적용 (Debian/Ubuntu 예시):
#   sudo cp docs/nginx-openresty-aim.iceberg101.com.conf /etc/nginx/sites-available/aim.iceberg101.com
#   sudo ln -sf /etc/nginx/sites-available/aim.iceberg101.com /etc/nginx/sites-enabled/
# OpenResty:
#   sudo cp ... /usr/local/openresty/nginx/conf/sites/aim.iceberg101.com.conf
#   # nginx.conf 에 include sites/*.conf 추가 후
#   sudo /usr/local/openresty/bin/openresty -t && sudo /usr/local/openresty/bin/openresty -s reload
#
# 백엔드가 다른 머신이면 아래 set $upstream ... 를 해당 IP:8080 으로 바꾸세요.

# ACME 인증용 웹루트 (certbot --webroot -w 와 동일 경로)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream aim_backend {
    # 같은 서버에서 node(8080) 실행 시
    server 127.0.0.1:8080;
    # 분리 배포 시 예: server 10.1.186.30:8080;
    keepalive 32;
}

# HTTP — 인증서 발급·갱신 + HTTPS로 리다이렉트
server {
    listen 80;
    listen [::]:80;
    server_name aim.iceberg101.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name aim.iceberg101.com;

    # Let's Encrypt (certbot 발급 후 경로)
    ssl_certificate     /etc/letsencrypt/live/aim.iceberg101.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aim.iceberg101.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    # certbot 설치 후 있으면 추가 권장:
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # (옵션) HSTS — 인증서·리다이렉트 안정화 후 켜기
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 50m;

    # API·업로드·장시간 작업 (주간보고 등)
    location /api/ {
        proxy_pass http://aim_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        send_timeout 600s;
    }

    location /uploads/ {
        proxy_pass http://aim_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket (백엔드가 8080 에 붙어 있음)
    location / {
        proxy_pass http://aim_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
    }
}
